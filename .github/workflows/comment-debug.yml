name: comment-debug

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

jobs:
  debug:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.comment.body, '/debug') || contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Print event details
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "event=$EVENT_NAME"
          echo "comment=$COMMENT_BODY"
          echo "issue=$ISSUE_NUMBER"

      - name: Comment back on issue or PR
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "comment-debug triggered successfully"
            })
